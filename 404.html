<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎关注 | 微信公众号</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #1aad19;
            --secondary-color: #2c3e50;
            --background-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
            background: var(--background-gradient);
            min-height: 100vh;
            line-height: 1.6;
            color: var(--secondary-color);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        .logo {
            width: 80px;
            margin-bottom: 20px;
        }

        .hero-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }

        .qrcode-card {
            position: relative;
            padding: 30px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .qrcode-card:hover {
            transform: translateY(-5px);
        }

        .qrcode-img {
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            border: 3px solid var(--primary-color);
            border-radius: 12px;
            background: url('your-qrcode.jpg') center/cover;
            aspect-ratio: 1/1;
        }

        .guide-section {
            padding-left: 30px;
        }

        .step-list {
            display: grid;
            gap: 30px;
            margin: 40px 0;
        }

        .step-card {
            display: flex;
            align-items: center;
            padding: 25px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .step-card:hover {
            transform: translateX(10px);
        }

        .step-icon {
            width: 50px;
            height: 50px;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-right: 20px;
            flex-shrink: 0;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            padding: 15px 40px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .cta-button i {
            margin-right: 10px;
            font-size: 24px;
        }

        .cta-button:hover {
            background: #168c15;
            box-shadow: 0 5px 15px rgba(26, 173, 25, 0.3);
        }

        .tips {
            margin-top: 30px;
            color: #666;
            font-size: 14px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .hero-section {
                grid-template-columns: 1fr;
                padding: 30px;
            }

            .guide-section {
                padding-left: 0;
            }

            .step-card {
                padding: 20px;
            }

            .cta-button {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            .qrcode-img {
                max-width: 220px;
            }

            .step-icon {
                width: 40px;
                height: 40px;
            }
        }

        /* 动画效果 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-section {
            animation: fadeIn 0.8s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>升级中欢迎加入<span style="color: var(--primary-color);">微信公众号</span></h1>
            <p>获取独家内容、最新资讯和专属福利</p>
        </header>

        <div class="hero-section">
            <!-- 左侧二维码区域 -->
            <div class="qrcode-card">
                <div class="https://bingbook.cn/wx"></div>
                <p class="tips" style="margin-top: 20px;">长按二维码保存到相册</p>
            </div>

            <!-- 右侧操作指引 -->
            <div class="guide-section">
                <div class="step-list">
                    <div class="step-card">
                        <div class="step-icon"><i class="fas fa-plus"></i></div>
                        <div>
                            <h3>步骤一：打开微信</h3>
                            <p>点击右上角 "+" 按钮</p>
                        </div>
                    </div>

                    <div class="step-card">
                        <div class="step-icon"><i class="fas fa-camera"></i></div>
                        <div>
                            <h3>步骤二：扫码关注</h3>
                            <p>选择「扫一扫」功能</p>
                        </div>
                    </div>

                    <div class="step-card">
                        <div class="step-icon"><i class="fas fa-check"></i></div>
                        <div>
                            <h3>步骤三：完成关注</h3>
                            <p>进入公众号查看欢迎消息</p>
                        </div>
                    </div>
                </div>

                <a href="weixin://" class="cta-button">
                    <i class="fab fa-weixin"></i>
                    立即打开微信
                </a>

                <p class="tips">若无法自动跳转，请手动打开微信扫一扫</p>
            </div>
        </div>
    </div>
</body>
</html>
