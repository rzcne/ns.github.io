<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楠树</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: #f0f9eb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 166, 90, 0.15);
            padding: 30px;
            width: 100%;
            max-width: 400px;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        .header {
            font-size: 24px;
            color: #006837;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #00a65a;
            text-align: center;
        }

        .status {
            font-size: 18px;
            color: #666;
            margin: 20px 0;
            text-align: center;
            position: relative;
            padding: 12px;
            background: #f8fff8;
            border-radius: 8px;
            animation: pulse 1.5s infinite;
        }

        .icp {
            font-size: 14px;
            color: rgba(0, 168, 90, 0.8);
            text-align: center;
            margin-top: 25px;
            letter-spacing: 0.5px;
        }

        .footer {
            margin-top: 30px;
            height: 4px;
            background: linear-gradient(90deg, #00a65a 0%, #8bc34a 100%);
            border-radius: 2px;
        }

        @keyframes pulse {
            0% { opacity: 0.9; }
            50% { opacity: 0.6; }
            100% { opacity: 0.9; }
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            .header {
                font-size: 20px;
            }
            .status {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">楠树</div>
        <div class="status">网站建设中…</div>
        <div class="status">联系邮箱📭 mail@bingbook.cn</div>
        <a href="https://beian.miit.gov.cn/" target="_blank">浙B2-20080101</a>
        <div class="footer"></div>
    </div>
</body>
</html>
